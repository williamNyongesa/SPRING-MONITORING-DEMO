# Application Info
spring.application.name=spring-monitoring-demo
server.port=8080

# PostgreSQL Database Configuration
# Update these with your actual PostgreSQL credentials
spring.datasource.url=jdbc:postgresql://localhost:5432/monitoring_demo
spring.datasource.username=postgres
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Spring Boot Actuator - Enable all endpoints
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# Application Info for Actuator
info.app.name=Spring Monitoring Demo
info.app.version=1.0.0
info.app.author=William Nyongesa
info.app.github=github.com/williamNyongesa

# Logging
logging.level.com.william=DEBUG
logging.level.org.springframework.web=INFO
