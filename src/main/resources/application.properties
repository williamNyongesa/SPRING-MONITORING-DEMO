spring.application.name=spring-monitoring-demo

# Database - overridden by Docker env vars when containerized
spring.datasource.url=jdbc:postgresql://localhost:5432/monitoring_db
spring.datasource.username=william
spring.datasource.password=william123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator
management.endpoints.web.exposure.include=health,prometheus,loggers,info
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
